version: '3.8'

services:
  # --- MySQL database ---
  mysql:
    image: mysql:8.0
    container_name: orchestra-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-orchestra_root_pass}
      MYSQL_DATABASE: ${DB_NAME:-orchestra_attendance}
      MYSQL_USER: ${DB_USER:-orchestra}
      MYSQL_PASSWORD: ${DB_PASSWORD:-orchestra_pass}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./backend/migrations/001_schema.sql:/docker-entrypoint-initdb.d/001_schema.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - orchestra

  # --- Node.js app (API + frontend) ---
  app:
    build: .
    container_name: orchestra-app
    restart: unless-stopped
    env_file: .env
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      NODE_ENV: production
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - orchestra

  # --- NGINX reverse proxy with SSL ---
  nginx:
    image: nginx:alpine
    container_name: orchestra-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - certbot_www:/var/www/certbot:ro
      - certbot_certs:/etc/letsencrypt:ro
    depends_on:
      - app
    networks:
      - orchestra

  # --- Certbot for Let's Encrypt ---
  certbot:
    image: certbot/certbot
    container_name: orchestra-certbot
    volumes:
      - certbot_www:/var/www/certbot
      - certbot_certs:/etc/letsencrypt

volumes:
  mysql_data:
  certbot_www:
  certbot_certs:

networks:
  orchestra:
